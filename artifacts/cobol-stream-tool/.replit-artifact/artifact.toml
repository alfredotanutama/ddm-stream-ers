kind = "web"
previewPath = "/"
title = "COBOL Stream Tool"
version = "1.0.0"
id = "artifacts/cobol-stream-tool"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19258

[services.development]
run = "pnpm --filter @workspace/cobol-stream-tool run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cobol-stream-tool", "run", "build" ]
publicDir = "artifacts/cobol-stream-tool/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19258"
BASE_PATH = "/"
